<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video overview</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>自定义封面poster</h1>
    <video poster="video/rat-fill.svg" src="video/marvel.mp4" controls></video>

    <h1>预加载</h1>
    <video src="video/marvel.mp4" controls></video>

    <h1>自动播放</h1>
    <video src="video/Monument.mp4" autoplay muted loop></video>

    <h1>DOM</h1>
    <video class="video" src="video/marvel.mp4" controls></video>
    <!-- 播放状态看板: duration、currentTime、 -->
    <div class="panel">
      <p>duration:</p>
      <p>currentTime:</p>
      <button class="btn play">play</button>
      <!-- 音量控制 -->
      <!-- 静音按钮 -->
      <!-- 播放速率 -->
    </div>
  </body>

  <script>
    // =========
    //   DOM
    //===========
    const video = document.querySelector('.video');
    const play = document.querySelector('.play');

    play.addEventListener('click', () => {
      video.play();
    });
  </script>

  <script type="module" src="main.js"></script>
</html>
